name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Frontend lint
        run: npm run lint

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend test
        run: npm run test -- --run

      - name: Frontend build
        run: npm run build

      - name: Install API deps
        run: npm ci
        working-directory: api

      - name: API lint
        run: npm run lint
        working-directory: api

      - name: API typecheck
        run: npm run typecheck
        working-directory: api

      - name: API test
        run: npm run test -- --run
        working-directory: api

      - name: API build
        run: npm run build
        working-directory: api
